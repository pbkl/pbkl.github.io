<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 网页</title>
    <style>
        /* 设置整个网页的背景和布局 */
        body {
            margin: 0;                  /* 清除默认的边缘留白 */
            height: 100vh;              /* 让网页高度等于整个浏览器窗口高度 */
            background-color: white;    /* 背景设置为纯白/空白 */
            display: flex;              /* 启用弹性盒子布局 */
            justify-content: center;    /* 让内容水平居中 */
            align-items: center;        /* 让内容垂直居中 */
        }

        /* 设置中间大字的样式 */
        .center-text {
            color: green;               /* 字体颜色设定为绿色 */
            font-size: 100px;           /* 设置极大的字号，可自行修改数字 */
            text-transform: uppercase;  /* 强制英文字母全部大写 */
            font-family: Arial, sans-serif; /* 使用简洁平滑的字体 */
            margin: 0;                  /* 清除标题自带的上下间距 */
        }
    </style>
</head>
<body>

    <!-- 网页正中间显示的文字 -->
    <h1 class="center-text">HELLO WORLD</h1>

</body>
</html>
